name: Build and Test
on: [push]

permissions:
  contents: read

jobs:
  bat:
    name: Build and Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Perform npm tasks
        run: npm run ci
