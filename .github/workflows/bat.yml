name: Build and Test
on: [push]
permissions:
  contents: read

jobs:
  plugin-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
          - os: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: matlab-actions/setup-matlab@v3
        with:
          release: latest
      - uses: matlab-actions/run-tests@v3
        with:
          source-folder: plugins

  bat:
    name: Build and Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Perform npm tasks
        run: npm run ci
